<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00cc6a"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00ff88" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#00ff88" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="#050505"/>

  <!-- Subtle glow blob -->
  <ellipse cx="96" cy="88" rx="80" ry="72" fill="url(#bgGlow)"/>

  <!-- Border -->
  <rect width="192" height="192" rx="40" fill="none" stroke="#00ff88" stroke-width="2" stroke-opacity="0.25"/>

  <!-- Corner star dots -->
  <circle cx="28" cy="28" r="3" fill="#00ff88" opacity="0.5"/>
  <circle cx="164" cy="28" r="2" fill="#00ff88" opacity="0.35"/>
  <circle cx="164" cy="164" r="3" fill="#00ff88" opacity="0.45"/>
  <circle cx="28" cy="164" r="2" fill="#00ff88" opacity="0.3"/>

  <!-- Constellation lines -->
  <line x1="28" y1="28" x2="164" y2="28" stroke="#00ff88" stroke-width="0.5" stroke-opacity="0.1"/>
  <line x1="28" y1="164" x2="164" y2="164" stroke="#00ff88" stroke-width="0.5" stroke-opacity="0.1"/>

  <!-- Main S lettermark with glow -->
  <text
    x="96" y="128"
    font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="108"
    font-weight="900"
    fill="url(#sGrad)"
    text-anchor="middle"
    filter="url(#softGlow)"
    letter-spacing="-3"
  >S</text>

  <!-- Underline accent -->
  <rect x="52" y="144" width="88" height="3" rx="1.5" fill="url(#lineGrad)"/>

  <!-- Tagline dots -->
  <circle cx="72" cy="158" r="2" fill="#00ff88" opacity="0.4"/>
  <circle cx="96" cy="158" r="2.5" fill="#00ff88" opacity="0.7"/>
  <circle cx="120" cy="158" r="2" fill="#00ff88" opacity="0.4"/>
</svg>
