<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00cc6a"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0"/>
      <stop offset="25%" stop-color="#00ff88" stop-opacity="0.8"/>
      <stop offset="75%" stop-color="#00ff88" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="#050505"/>

  <!-- Glow blob -->
  <ellipse cx="256" cy="230" rx="220" ry="200" fill="url(#bgGlow)"/>

  <!-- Border -->
  <rect width="512" height="512" rx="108" fill="none" stroke="#00ff88" stroke-width="3" stroke-opacity="0.2"/>

  <!-- Corner stars -->
  <circle cx="72" cy="72" r="5" fill="#00ff88" opacity="0.55"/>
  <circle cx="440" cy="72" r="3.5" fill="#00ff88" opacity="0.35"/>
  <circle cx="440" cy="440" r="5" fill="#00ff88" opacity="0.5"/>
  <circle cx="72" cy="440" r="3.5" fill="#00ff88" opacity="0.3"/>

  <!-- Extra micro stars -->
  <circle cx="160" cy="56" r="2" fill="#00ff88" opacity="0.25"/>
  <circle cx="352" cy="456" r="2" fill="#00ff88" opacity="0.25"/>
  <circle cx="56" cy="200" r="1.5" fill="#00ff88" opacity="0.2"/>
  <circle cx="456" cy="312" r="1.5" fill="#00ff88" opacity="0.2"/>

  <!-- Main S lettermark -->
  <text
    x="256" y="348"
    font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="290"
    font-weight="900"
    fill="url(#sGrad)"
    text-anchor="middle"
    filter="url(#softGlow)"
    letter-spacing="-8"
  >S</text>

  <!-- Underline accent bar -->
  <rect x="136" y="382" width="240" height="7" rx="3.5" fill="url(#lineGrad)"/>

  <!-- Three dots below -->
  <circle cx="192" cy="420" r="5" fill="#00ff88" opacity="0.4"/>
  <circle cx="256" cy="420" r="6.5" fill="#00ff88" opacity="0.75"/>
  <circle cx="320" cy="420" r="5" fill="#00ff88" opacity="0.4"/>
</svg>
