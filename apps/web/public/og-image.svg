<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1e293b" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Avatar placeholder -->
  <circle cx="120" cy="160" r="60" fill="#1e293b" stroke="#2563EB" stroke-width="3"/>
  <circle cx="120" cy="148" r="22" fill="#2563EB" opacity="0.8"/>
  <ellipse cx="120" cy="200" rx="36" ry="20" fill="#2563EB" opacity="0.5"/>

  <!-- Name -->
  <text x="210" y="130" font-size="48" font-weight="900" font-family="system-ui,sans-serif" fill="#f8fafc">Muhammad Bintang</text>
  <text x="210" y="185" font-size="48" font-weight="900" font-family="system-ui,sans-serif" fill="#f8fafc">Al Akbar</text>
  <text x="210" y="230" font-size="22" font-family="system-ui,sans-serif" fill="#94a3b8">Front-End Developer · React &amp; React Native</text>

  <!-- Divider -->
  <rect x="80" y="270" width="1040" height="1" fill="#1e293b"/>

  <!-- Skills row -->
  <g transform="translate(80, 300)">
    <rect x="0"   y="0" width="140" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="70"  y="26" font-size="14" text-anchor="middle" font-family="system-ui,sans-serif" fill="#94a3b8">React.js</text>
    <rect x="152" y="0" width="140" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="222" y="26" font-size="14" text-anchor="middle" font-family="system-ui,sans-serif" fill="#94a3b8">React Native</text>
    <rect x="304" y="0" width="140" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="374" y="26" font-size="14" text-anchor="middle" font-family="system-ui,sans-serif" fill="#94a3b8">TypeScript</text>
    <rect x="456" y="0" width="140" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="526" y="26" font-size="14" text-anchor="middle" font-family="system-ui,sans-serif" fill="#94a3b8">Expo</text>
    <rect x="608" y="0" width="140" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="678" y="26" font-size="14" text-anchor="middle" font-family="system-ui,sans-serif" fill="#94a3b8">Go</text>
    <rect x="760" y="0" width="140" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="830" y="26" font-size="14" text-anchor="middle" font-family="system-ui,sans-serif" fill="#94a3b8">Supabase</text>
  </g>

  <!-- Stats -->
  <g transform="translate(80, 380)">
    <text x="0"   y="0" font-size="36" font-weight="800" font-family="system-ui,sans-serif" fill="#2563EB">3+</text>
    <text x="0"   y="24" font-size="13" font-family="system-ui,sans-serif" fill="#64748b">Years Experience</text>
    <text x="160" y="0" font-size="36" font-weight="800" font-family="system-ui,sans-serif" fill="#2563EB">9+</text>
    <text x="160" y="24" font-size="13" font-family="system-ui,sans-serif" fill="#64748b">Projects Shipped</text>
    <text x="320" y="0" font-size="36" font-weight="800" font-family="system-ui,sans-serif" fill="#2563EB">3+</text>
    <text x="320" y="24" font-size="13" font-family="system-ui,sans-serif" fill="#64748b">Happy Clients</text>
  </g>

  <!-- URL -->
  <text x="80" y="570" font-size="18" font-family="system-ui,sans-serif" fill="#475569">stareezy.tech</text>
</svg>
